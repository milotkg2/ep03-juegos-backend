# Configuración para tests — sobreescribe application.yml
# Se activa con @ActiveProfiles("test") o -Dspring.profiles.active=test
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

  h2:
    console:
      enabled: false

cors:
  allowed-origins: "http://localhost:3000"
