# docker-compose standalone del backend
# Ejecutar segundo (despues de la DB): docker compose up -d
services:
  ep03-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ep03-backend:latest
    container_name: ep03-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://ep03-db:5432/ep03
      SPRING_DATASOURCE_USERNAME: ep03_user
      SPRING_DATASOURCE_PASSWORD: ep03_pass
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - ep03-network

networks:
  ep03-network:
    external: true